name: Deploy Firestore & Storage Rules

on:
  push:
    branches: [ "main" ]
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "firebase.json"
      - ".github/workflows/deploy-rules.yml"
  workflow_dispatch: {}

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firestore & Storage rules
        run: npx firebase-tools@latest deploy --only firestore:rules,storage:rules --project garage-revolutions --non-interactive
